name: Pipeline Pertama

on:
  push:
    branches:
      - main

jobs:

  backend-test:
    runs-on: [self-hosted, Linux]

    defaults:
      run:
        working-directory: "./aegira-loan-service (Backend)"

    steps:
      - uses: actions/checkout@v4

      - name: Cek Java
        run: |
          java -version

      - name: Cek Maven
        run: |
          mvn -version

      - name: Backend Unit Test
        run: |
          mvn clean test

  frontend-test:
    runs-on: [self-hosted, Linux]
    needs: backend-test

    defaults:
      run:
        working-directory: "./creditappdemo (Frontend)"

    steps:
      - uses: actions/checkout@v4

      - name: Cek Node
        run: |
          node -v
          npm -v

      - name: Install Dependencies
        run: |
          npm ci

      - name: Install Playwright Browser
        run: |
          npx playwright install

      - name: Jalankan Frontend Test
        run: |
          npx playwright test

      - name: Tampilkan Error Context
        if: failure()
        run: |
          echo "=== ERROR CONTEXT FILES ==="
          find . -name "error-context.md"

          echo ""
          echo "=== ERROR CONTENT ==="
          find . -name "error-context.md" \
            -exec echo "====================" \; \
            -exec echo "FILE: {}" \; \
            -exec cat {} \;

      - name: Upload Playwright Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            creditappdemo (Frontend)/playwright-report
            creditappdemo (Frontend)/test-results

  deploy:
    runs-on: [self-hosted, Linux]
    needs:
      - backend-test
      - frontend-test

    steps:
      - uses: actions/checkout@v4

      - name: Deploy aplikasi
        run: |
          docker compose up -d --build