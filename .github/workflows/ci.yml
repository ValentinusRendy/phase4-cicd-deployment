name: Pipeline Pertama

on:
  push:
    branches:
      - main

jobs:

  backend-test:
    runs-on: [self-hosted, Linux]

    steps:
      - uses: actions/checkout@v4

      - name: Backend Unit Test
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w "/workspace/aegira-loan-service (Backend)" \
            maven:3.9.9-eclipse-temurin-21 \
            mvn clean test

  frontend-test:
    runs-on: [self-hosted, Linux]
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Frontend Test
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w "/workspace/creditappdemo (Frontend)" \
            mcr.microsoft.com/playwright:v1.54.2-noble \
            bash -c "
              npm ci &&
              npx playwright test
            "

  deploy:
    runs-on: [self-hosted, Linux]
    needs:
      - backend-test
      - frontend-test

    steps:
      - uses: actions/checkout@v4

      - name: Deploy aplikasi
        run: |
          docker compose up -d --build