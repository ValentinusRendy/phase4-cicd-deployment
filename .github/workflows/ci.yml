name: Pipeline Pertama

on:
  push:
    branches:
      - main

jobs:

  backend-test:
    runs-on: [self-hosted, Linux]

    defaults:
      run:
        working-directory: "./aegira-loan-service (Backend)"

    steps:
      - uses: actions/checkout@v4

      - name: Test Backend
        run: |
          mvn clean test

  frontend-test:
    runs-on: [self-hosted, Linux]
    needs: backend-test

    defaults:
      run:
        working-directory: "./creditappdemo (Frontend)"

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          npm ci

      - name: Run Frontend Tests
        run: |
          npx playwright test

  deploy:
    runs-on: [self-hosted, Linux]
    needs:
      - backend-test
      - frontend-test

    steps:
      - uses: actions/checkout@v4

      - name: Deploy aplikasi
        run: |
          docker compose up -d --build
          