name: Pipeline Pertama

on:
  push:
    branches:
      - main

jobs:

  backend-test:
    runs-on: [self-hosted, Linux]

    steps:
      - uses: actions/checkout@v4

      - name: Debug Runner
        run: |
          pwd
          ls -la
          find . -name pom.xml

      - name: Debug Docker
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            maven:3.9.9-eclipse-temurin-21 \
            bash -c "
              echo 'WORKSPACE CONTENT:'
              ls -la /workspace
              echo ''
              echo 'POM FILES:'
              find /workspace -name pom.xml
            "

  frontend-test:
    runs-on: [self-hosted, Linux]
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Frontend Test
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            mcr.microsoft.com/playwright:v1.54.2-noble \
            bash -c "
              cd '/workspace/creditappdemo (Frontend)'
              npm ci
              npx playwright test
            "

  deploy:
    runs-on: [self-hosted, Linux]
    needs:
      - backend-test
      - frontend-test

    steps:
      - uses: actions/checkout@v4

      - name: Deploy aplikasi
        run: |
          docker compose up -d --build