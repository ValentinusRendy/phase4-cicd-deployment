services:
  postgres:
    image: postgres:14-alpine
    container_name: aegira-postgres
    environment:
      POSTGRES_DB: aegira_loan
      POSTGRES_USER: aegira
      POSTGRES_PASSWORD: aegira_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegira -d aegira_loan"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aegira-network

  redis:
    image: redis:5.0.3-alpine
    container_name: aegira-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aegira-network

volumes:
  postgres_data:
  redis_data:

networks:
  aegira-network:
    driver: bridge
